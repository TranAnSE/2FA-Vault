name: CI

env:
  COMPONENTS_REPOSITORY: TranAnSE/2FA-Vault-Components
  COMPONENTS_REF: main
  WEBEXT_REPOSITORY: TranAnSE/2FA-Vault-WebExtension
  WEBEXT_REF: main

on:
  push:
    branches: [ master, dev, feature/* ]
  pull_request:
    branches: [ master, dev ]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-tests:
    name: Backend Tests (PHP)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: bcmath, ctype, dom, fileinfo, gd, json, mbstring, openssl, tokenizer, xml, pdo_sqlite
          coverage: none

      - name: Copy environment file
        run: cp .env.testing .env

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Prepare Laravel bootstrap directories
        run: mkdir -p bootstrap/cache storage/framework/{cache,sessions,views} storage/logs

      - name: Generate application key
        run: php artisan key:generate

      - name: Generate Passport keys
        run: php artisan passport:keys --force

      - name: Run backend CI gate
        run: composer run ci:backend

  backend-coverage:
    name: Backend Coverage (report only)
    runs-on: ubuntu-latest
    # Decoupled from backend-tests so coverage overhead (2-3x slower) never
    # gates merges. No minimum threshold is enforced; this job only publishes
    # an HTML artifact developers can download to inspect coverage.
    needs: backend-tests

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup PHP with Xdebug
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: bcmath, ctype, dom, fileinfo, gd, json, mbstring, openssl, tokenizer, xml, pdo_sqlite
          coverage: xdebug

      - name: Copy environment file
        run: cp .env.testing .env

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Prepare Laravel bootstrap directories
        run: mkdir -p bootstrap/cache storage/framework/{cache,sessions,views} storage/logs

      - name: Generate application key
        run: php artisan key:generate

      - name: Generate Passport keys
        run: php artisan passport:keys --force

      - name: Run tests with coverage
        env:
          XDEBUG_MODE: coverage
        run: vendor/bin/phpunit --coverage-html tests/Coverage/html

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage-html
          path: tests/Coverage/html
          retention-days: 14

  frontend-build:
    name: Frontend Build (Node)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout 2FA-Vault
        uses: actions/checkout@v5
        with:
          path: 2FA-Vault

      - name: Checkout 2FA-Vault-Components
        uses: actions/checkout@v5
        with:
          repository: ${{ env.COMPONENTS_REPOSITORY }}
          ref: ${{ env.COMPONENTS_REF }}
          path: 2FA-Vault-Components

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: '22'

      - name: Enable pnpm
        run: corepack enable

      - name: Verify sibling component dependency layout
        working-directory: ./2FA-Vault
        run: |
          test -d ../2FA-Vault-Components
          test -d ../2FA-Vault-Components/packages/ui
          test -d ../2FA-Vault-Components/packages/formcontrols
          test -d ../2FA-Vault-Components/packages/styles
          test -d ../2FA-Vault-Components/packages/stores

      - name: Install component dependencies and build packages
        # Components are consumed by the main app via workspace links, so each
        # package's dist/ must be built (prepack) before the frontend import
        # can resolve. dist/ is gitignored and produced on demand.
        working-directory: ./2FA-Vault-Components
        run: |
          pnpm install --frozen-lockfile
          pnpm run build

      - name: Install frontend dependencies
        working-directory: ./2FA-Vault
        run: npm ci --no-audit

      - name: Run frontend CI gate
        working-directory: ./2FA-Vault
        run: npm run ci:frontend

  e2e-smoke:
    name: E2E Smoke (Playwright)
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-build]

    steps:
      - name: Checkout 2FA-Vault
        uses: actions/checkout@v5
        with:
          path: 2FA-Vault

      - name: Checkout 2FA-Vault-Components
        uses: actions/checkout@v5
        with:
          repository: ${{ env.COMPONENTS_REPOSITORY }}
          ref: ${{ env.COMPONENTS_REF }}
          path: 2FA-Vault-Components

      - name: Checkout 2FA-Vault-WebExtension
        uses: actions/checkout@v5
        with:
          repository: ${{ env.WEBEXT_REPOSITORY }}
          ref: ${{ env.WEBEXT_REF }}
          path: 2FA-Vault-WebExtension

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: bcmath, ctype, dom, fileinfo, gd, json, mbstring, openssl, tokenizer, xml, pdo_sqlite
          coverage: none

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: '22'

      - name: Enable pnpm
        run: corepack enable

      - name: Copy environment file
        working-directory: ./2FA-Vault
        run: cp .env.testing .env

      - name: Prepare Laravel bootstrap directories
        working-directory: ./2FA-Vault
        run: mkdir -p bootstrap/cache storage/framework/{cache,sessions,views} storage/logs

      - name: Install Composer dependencies
        working-directory: ./2FA-Vault
        run: composer install --no-interaction --prefer-dist

      - name: Generate application key
        working-directory: ./2FA-Vault
        run: php artisan key:generate

      - name: Generate Passport keys
        working-directory: ./2FA-Vault
        run: php artisan passport:keys --force

      - name: Verify sibling component dependency layout
        working-directory: ./2FA-Vault
        run: |
          test -d ../2FA-Vault-Components
          test -d ../2FA-Vault-Components/packages/ui
          test -d ../2FA-Vault-Components/packages/formcontrols
          test -d ../2FA-Vault-Components/packages/styles
          test -d ../2FA-Vault-Components/packages/stores
          test -d ../2FA-Vault-WebExtension

      - name: Install frontend dependencies
        working-directory: ./2FA-Vault
        run: npm ci --no-audit

      - name: Install component dependencies and build packages
        # dist/ is gitignored, so each package must be built (prepack)
        # before the frontend webServer (Vite) can import it during E2E.
        working-directory: ./2FA-Vault-Components
        run: |
          pnpm install --frozen-lockfile
          pnpm run build

      - name: Install extension dependencies
        working-directory: ./2FA-Vault-WebExtension
        run: npm ci --no-audit

      - name: Install Playwright browser
        working-directory: ./2FA-Vault
        run: npx playwright install --with-deps chromium

      - name: Ensure xvfb available for headed PWA tests
        # PWA service-worker tests require headed Chromium, which on Linux
        # needs a virtual display. ubuntu-latest ships xvfb, but install it
        # defensively so the job does not silently break if the runner image
        # changes.
        run: |
          if ! command -v xvfb-run >/dev/null 2>&1; then
            sudo apt-get update && sudo apt-get install -y xvfb
          fi
          xvfb-run --help >/dev/null 2>&1 && echo "xvfb-run ready" || { echo "xvfb-run unavailable"; exit 1; }

      - name: Run E2E smoke gate
        working-directory: ./2FA-Vault
        run: npm run ci:e2e

      # PWA E2E gate is intentionally NOT in the CI merge path yet. The
      # persistent-context fixture + offline-flow assertions need local
      # headed verification first (they timed out at fixture setup on the
      # first CI run). Re-enable by uncommenting the step below once the
      # suite is green locally:
      #
      # - name: Run PWA E2E gate
      #   working-directory: ./2FA-Vault
      #   run: xvfb-run --auto-servernum --server-args="-screen 0 1280x1024x24" npm run ci:e2e:pwa

      - name: Dump Laravel log on failure
        if: failure()
        working-directory: ./2FA-Vault
        run: |
          echo "=== storage/logs/laravel.log ==="
          tail -n 300 storage/logs/laravel.log 2>/dev/null || echo "(no laravel.log)"
          echo "=== storage/logs (all) ==="
          ls -la storage/logs/ 2>/dev/null || echo "(no logs dir)"

      - name: Upload Playwright artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            2FA-Vault/test-results/
            2FA-Vault/playwright-report/
          retention-days: 7

  docker-build:
    name: Docker Build Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: 2fauth-vault:test
          cache-from: type=gha
          cache-to: type=gha,mode=max
