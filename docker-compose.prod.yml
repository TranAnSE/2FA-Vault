# =============================================================================
# 2FA-Vault production stack
# -----------------------------------------------------------------------------
# Architecture: single app container (Dockerfile bundles nginx + php-fpm via
# supervisord, exposes port 8000) + MySQL + Redis + db-backup sidecar.
#
# HTTPS is terminated OUTSIDE this stack by a reverse proxy / Cloudflare Tunnel.
# Set TRUSTED_PROXIES so Laravel trusts X-Forwarded-Proto from the proxy.
#
# Usage:
#   1. cp .env.example .env  &&  edit values
#   2. docker compose -f docker-compose.prod.yml up -d
#   3. docker compose -f docker-compose.prod.yml logs -f app
#
# Healthcheck route is GET /up (not /health).
# Persistent app data lives in the 2fa-vault-data volume, mounted at /2fauth
# (lowercase) to match docker/entrypoint.sh symlinks.
# =============================================================================

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: 2fa-vault:prod
    container_name: 2fa-vault-app
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8000}:8000"
    environment:
      # --- App ---
      - APP_NAME=${APP_NAME:-2FA-Vault}
      - APP_ENV=production
      - APP_KEY=${APP_KEY}
      - APP_DEBUG=false
      - APP_URL=${APP_URL:-http://localhost:8000}

      # --- Database ---
      - DB_CONNECTION=mysql
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_DATABASE=${DB_DATABASE:-2fa_vault}
      - DB_USERNAME=${DB_USERNAME:-2fa_vault_user}
      - DB_PASSWORD=${DB_PASSWORD}

      # --- Redis ---
      - REDIS_HOST=redis
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - REDIS_PORT=6379
      - REDIS_CLIENT=phpredis
      - REDIS_CACHE_DB=1
      - REDIS_SESSION_DB=2
      - REDIS_QUEUE_DB=3

      # --- Cache & sessions ---
      - CACHE_DRIVER=redis
      - SESSION_DRIVER=redis
      - SESSION_LIFETIME=120
      - QUEUE_CONNECTION=redis

      # --- Encryption (Argon2id E2EE) ---
      - ENCRYPTION_ENABLED=true
      - ARGON2_MEMORY=${ARGON2_MEMORY:-65536}
      - ARGON2_TIME=${ARGON2_TIME:-3}
      - ARGON2_THREADS=${ARGON2_THREADS:-4}

      # --- Multi-user ---
      - ALLOW_REGISTRATION=${ALLOW_REGISTRATION:-false}
      - MAX_TEAMS_PER_USER=${MAX_TEAMS_PER_USER:-5}

      # --- Web push (VAPID) ---
      - VAPID_PUBLIC_KEY=${VAPID_PUBLIC_KEY}
      - VAPID_PRIVATE_KEY=${VAPID_PRIVATE_KEY}
      - VAPID_SUBJECT=${VAPID_SUBJECT:-mailto:admin@example.com}

      # --- PWA ---
      - PWA_NAME=${PWA_NAME:-2FA-Vault}
      - PWA_SHORT_NAME=${PWA_SHORT_NAME:-2FA-Vault}
      - PWA_THEME_COLOR=${PWA_THEME_COLOR:-#4F46E5}

      # --- Mail ---
      - MAIL_MAILER=${MAIL_MAILER:-smtp}
      - MAIL_HOST=${MAIL_HOST:-smtp.mailtrap.io}
      - MAIL_PORT=${MAIL_PORT:-2525}
      - MAIL_USERNAME=${MAIL_USERNAME}
      - MAIL_PASSWORD=${MAIL_PASSWORD}
      - MAIL_ENCRYPTION=${MAIL_ENCRYPTION:-tls}
      - MAIL_FROM_ADDRESS=${MAIL_FROM_ADDRESS:-noreply@2fa-vault.example.com}
      - MAIL_FROM_NAME=${MAIL_FROM_NAME:-2FA-Vault}

      # --- Logging ---
      - LOG_CHANNEL=daily
      - LOG_LEVEL=${LOG_LEVEL:-info}

      # --- Rate limiting ---
      - THROTTLE_LOGIN=${THROTTLE_LOGIN:-5,1}
      - THROTTLE_API=${THROTTLE_API:-60,1}

      # --- Reverse proxy / HTTPS detection ---
      # HTTPS is terminated by the upstream proxy (Cloudflare Tunnel, Traefik,
      # host nginx). TRUSTED_PROXIES makes Laravel honor X-Forwarded-Proto.
      # Use a specific proxy IP list in production instead of "*" when possible.
      - TRUSTED_PROXIES=${TRUSTED_PROXIES:-*}

      # --- Sentry (optional, leave SENTRY_DSN empty = disabled) ---
      - SENTRY_DSN=${SENTRY_DSN:-}
      - SENTRY_ENVIRONMENT=${SENTRY_ENVIRONMENT:-production}
      - SENTRY_RELEASE=${SENTRY_RELEASE:-}
      - SENTRY_SAMPLE_RATE=${SENTRY_SAMPLE_RATE:-1.0}
      - SENTRY_TRACES_SAMPLE_RATE=${SENTRY_TRACES_SAMPLE_RATE:-0.0}
      - SENTRY_TEST_ENABLED=${SENTRY_TEST_ENABLED:-false}

    volumes:
      # Persistent app data: SQLite (if used), storage/, passport keys.
      # Path MUST be /2fauth (lowercase) to match docker/entrypoint.sh.
      - 2fa-vault-data:/2fauth

    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy

    networks:
      - 2fa-vault-network

    healthcheck:
      # Route is /up, not /health (see routes/web.php).
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:8000/up || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  mysql:
    image: mysql:8.0
    container_name: 2fa-vault-mysql
    restart: unless-stopped
    environment:
      - MYSQL_ROOT_PASSWORD=${DB_ROOT_PASSWORD}
      - MYSQL_DATABASE=${DB_DATABASE:-2fa_vault}
      - MYSQL_USER=${DB_USERNAME:-2fa_vault_user}
      - MYSQL_PASSWORD=${DB_PASSWORD}
      - MYSQL_ROOT_HOST=%

    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --default-authentication-plugin=mysql_native_password
      --max_connections=200
      --innodb_buffer_pool_size=256M
      --innodb_log_file_size=64M

    volumes:
      - mysql-data:/var/lib/mysql
      # Shared with db-backup sidecar for dump output and restore input.
      - mysql-backup:/backup

    networks:
      - 2fa-vault-network

    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s

  redis:
    image: redis:7-alpine
    container_name: 2fa-vault-redis
    restart: unless-stopped
    command: >
      sh -c "redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --save 900 1
      --save 300 10
      --save 60 10000
      --appendonly yes"

    volumes:
      - redis-data:/data

    networks:
      - 2fa-vault-network

    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ---------------------------------------------------------------------------
  # Automated MySQL backup sidecar.
  # Dumps the database on a schedule into the mysql-backup volume and prunes
  # old dumps. Tune via DB_BACKUP_* env vars. See docs/guides/backup-and-restore.md.
  # Disable by setting DB_BACKUP_ENABLED=false.
  # ---------------------------------------------------------------------------
  db-backup:
    image: databack/mysql-backup:1.0.0
    container_name: 2fa-vault-db-backup
    restart: unless-stopped
    profiles: ["backup"]
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      - DB_SERVER=mysql
      - DB_USER=root
      - DB_PASS=${DB_ROOT_PASSWORD}
      - DB_NAMES=${DB_DATABASE:-2fa_vault}
      - DB_DUMP_FREQ=${DB_BACKUP_FREQ:-1440}
      - DB_DUMP_BEGIN=${DB_BACKUP_BEGIN:-0300}
      - DB_DUMP_TARGET=/backup
      - DB_DUMP_KEEP_LAST=${DB_BACKUP_KEEP:-7}
      - DB_DUMP_COMPRESS=gzip
      - DB_DUMP_SAFECHARACTERS=true
    volumes:
      - mysql-backup:/backup
    networks:
      - 2fa-vault-network

networks:
  2fa-vault-network:
    driver: bridge

volumes:
  # App persistent data (SQLite if used, storage/, passport keys, icons cache).
  2fa-vault-data:
    driver: local
  # MySQL data files.
  mysql-data:
    driver: local
  # Redis AOF + RDB snapshots.
  redis-data:
    driver: local
  # Shared between mysql and db-backup: dump output / restore input.
  mysql-backup:
    driver: local
